name: Build and push arm64 image

# Builds a linux/arm64 image so it runs on AWS Graviton (t4g.*) instances.
# Uses a native arm64 runner (free for public repos) to avoid slow QEMU builds.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
    # Don't rebuild the image for infra/docs-only changes.
    paths-ignore: ["deploy/**", "**.md"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/imcp2

jobs:
  build-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
