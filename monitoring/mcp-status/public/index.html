<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IMCP Status Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --card: #ffffff;
        --border: #e4e7ec;
        --text: #1a1d23;
        --muted: #667085;
        --pass: #17b26a;
        --warn: #f79009;
        --fail: #f04438;
        --accent: #5b6cff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d0f14;
          --card: #161a22;
          --border: #2a2f3a;
          --text: #e7eaf0;
          --muted: #98a2b3;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
      }
      header {
        padding: 1.5rem 1.5rem 0.5rem;
        max-width: 60rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.4rem;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.85rem;
      }
      main {
        max-width: 60rem;
        margin: 0 auto;
        padding: 1rem 1.5rem 4rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin: 1rem 0;
      }
      .controls input {
        padding: 0.45rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--card);
        color: var(--text);
        font-size: 0.85rem;
        min-width: 14rem;
      }
      button {
        padding: 0.45rem 0.9rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        cursor: pointer;
      }
      button.secondary {
        background: var(--card);
        color: var(--text);
      }
      label.toggle {
        font-size: 0.85rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .overall {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--card);
        margin-bottom: 1.25rem;
      }
      .dot {
        width: 0.9rem;
        height: 0.9rem;
        border-radius: 50%;
        flex: none;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
      }
      .pass {
        --c: var(--pass);
      }
      .warn {
        --c: var(--warn);
      }
      .fail {
        --c: var(--fail);
      }
      .badge.pass,
      .badge.warn,
      .badge.fail {
        color: var(--c);
        background: color-mix(in srgb, var(--c) 14%, transparent);
      }
      .dot.pass,
      .dot.warn,
      .dot.fail {
        background: var(--c);
      }
      section.card {
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--card);
        margin-bottom: 1.25rem;
        overflow: hidden;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .card-head h2 {
        font-size: 1rem;
        margin: 0;
      }
      .check {
        padding: 0.75rem 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .check:last-child {
        border-bottom: none;
      }
      .check-top {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .check-label {
        font-weight: 600;
        font-size: 0.92rem;
      }
      .latency {
        color: var(--muted);
        font-size: 0.75rem;
        margin-left: auto;
      }
      .target {
        color: var(--muted);
        font-size: 0.78rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 0.2rem 0 0.1rem;
        word-break: break-all;
      }
      .detail {
        font-size: 0.85rem;
        margin-top: 0.1rem;
      }
      .expected {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.15rem;
      }
      ul.suggestions {
        margin: 0;
        padding: 0.5rem 1.25rem 1rem 2.4rem;
      }
      ul.suggestions li {
        margin: 0.4rem 0;
        font-size: 0.88rem;
      }
      .error {
        color: var(--fail);
        padding: 1rem;
      }
      .facts {
        font-size: 0.78rem;
        color: var(--muted);
        padding: 0 1.25rem 1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      .deployment {
        margin-top: 0.2rem;
      }
      .deployment code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .desc {
        font-size: 0.83rem;
        color: var(--muted);
        margin: 0.3rem 0 0.4rem;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }
      .tab {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.8rem;
        border: 1px solid var(--border);
        border-radius: 0.6rem;
        background: var(--card);
        color: var(--text);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }
      .tab.active {
        border-color: var(--accent);
        box-shadow: inset 0 -2px 0 var(--accent);
      }
      .tab .count {
        color: var(--muted);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>IMCP Status Dashboard</h1>
      <div class="sub">
        Health of the IC&nbsp;MCP server and its linked Internet Identity
        instance.
      </div>
    </header>
    <main>
      <div class="controls">
        <button id="refresh">Refresh</button>
        <label class="toggle">
          <input type="checkbox" id="auto" checked /> auto-refresh (30s)
        </label>
        <span class="sub" id="updated"></span>
      </div>
      <div id="content"><p class="sub">Loading…</p></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s).replace(
          /[&<>"]/g,
          (c) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );

      const badge = (status) =>
        `<span class="badge ${status}">${status}</span>`;
      const dot = (status) => `<span class="dot ${status}"></span>`;

      function renderCheck(c) {
        const latency =
          c.latencyMs != null ? `<span class="latency">${c.latencyMs} ms</span>` : "";
        const desc = c.description
          ? `<div class="desc">${esc(c.description)}</div>`
          : "";
        return `<div class="check">
          <div class="check-top">
            ${dot(c.status)}
            <span class="check-label">${esc(c.label)}</span>
            ${badge(c.status)}
            ${latency}
          </div>
          ${desc}
          <div class="target">${esc(c.target)}</div>
          <div class="detail">${esc(c.detail)}</div>
          <div class="expected">expected: ${esc(c.expected)}</div>
        </div>`;
      }

      // Tabbed navigation: one tab per section plus a Suggestions tab. The active
      // tab is remembered across refreshes and defaults to the first section that
      // isn't passing, so problems surface without hunting through the tabs.
      let lastReport = null;
      let activeTab = null;

      function fmtTime(epochSec) {
        if (typeof epochSec !== "number" || !isFinite(epochSec)) return "";
        const d = new Date(epochSec * 1000);
        const diff = Date.now() - d.getTime();
        const abs = Math.abs(diff);
        const units = [
          ["d", 86400e3],
          ["h", 3600e3],
          ["m", 60e3],
          ["s", 1e3],
        ];
        let rel = "just now";
        for (const [u, ms] of units) {
          if (abs >= ms) {
            rel = `${Math.floor(abs / ms)}${u} ${diff >= 0 ? "ago" : "from now"}`;
            break;
          }
        }
        return `${d.toLocaleString()} (${rel})`;
      }

      function deploymentHtml(dep) {
        if (!dep || (!dep.version && !dep.commit)) return "";
        const shortCommit =
          dep.commit && dep.commit !== "unknown" ? dep.commit.slice(0, 7) : dep.commit;
        const label = [dep.version ? "v" + dep.version : "", shortCommit]
          .filter(Boolean)
          .join(" @ ");
        const inner = dep.commitUrl
          ? `<a href="${esc(dep.commitUrl)}" target="_blank" rel="noopener noreferrer"><code>${esc(label)}</code></a>`
          : `<code>${esc(label || "unknown")}</code>`;
        const started = fmtTime(dep.startedAt);
        const redeployed = started
          ? ` &nbsp;·&nbsp; last redeployed ${esc(started)}`
          : "";
        const built = fmtTime(dep.builtAt);
        const builtStr = built ? ` &nbsp;·&nbsp; built ${esc(built)}` : "";
        return `<div class="deployment sub">Running deployment: ${inner}${redeployed}${builtStr}</div>`;
      }

      function renderPanel(report) {
        if (activeTab === "suggestions") {
          return `<section class="card">
            <ul class="suggestions">${(report.suggestions || [])
              .map((s) => `<li>${esc(s)}</li>`)
              .join("")}</ul>
          </section>`;
        }
        const sec = report.sections.find((s) => s.id === activeTab);
        if (!sec) return "";
        return `<section class="card">${sec.checks.map(renderCheck).join("")}</section>`;
      }

      function render(report) {
        lastReport = report;
        const t = report.targets;

        const tabs = report.sections.map((s) => ({
          id: s.id,
          title: s.title,
          status: s.status,
        }));
        if (report.suggestions?.length) {
          tabs.push({
            id: "suggestions",
            title: "Suggestions",
            count: report.suggestions.length,
          });
        }
        if (!tabs.some((x) => x.id === activeTab)) {
          const firstBad = report.sections.find((s) => s.status !== "pass");
          activeTab = firstBad ? firstBad.id : tabs[0] && tabs[0].id;
        }

        const canister = report.facts?.ii?.canisterId;
        const parts = [];
        parts.push(`<div class="overall">
          ${dot(report.overall)}
          <div>
            <div><strong>Overall: </strong>${badge(report.overall)}</div>
            <div class="sub">MCP: <code>${esc(t.mcpOrigin)}</code> &nbsp;·&nbsp; II: <code>${esc(t.iiOrigin || "(unresolved)")}</code>${canister ? ` &nbsp;·&nbsp; II canister: <code>${esc(canister)}</code>` : ""}</div>
            ${deploymentHtml(report.deployment)}
          </div>
        </div>`);

        parts.push(`<div class="tabs">${tabs
          .map(
            (x) =>
              `<button class="tab ${x.id === activeTab ? "active" : ""}" data-tab="${esc(x.id)}">${x.status ? dot(x.status) : ""}<span>${esc(x.title)}</span>${x.status ? badge(x.status) : `<span class="count">(${x.count})</span>`}</button>`,
          )
          .join("")}</div>`);

        parts.push(renderPanel(report));

        $("content").innerHTML = parts.join("");
        $("updated").textContent =
          "updated " + new Date(report.generatedAt).toLocaleTimeString();
      }

      // Tab clicks re-render from the cached report (no refetch).
      $("content").addEventListener("click", (e) => {
        const tab = e.target.closest(".tab");
        if (tab && lastReport) {
          activeTab = tab.dataset.tab;
          render(lastReport);
        }
      });

      let inFlight = false;
      async function load() {
        if (inFlight) return;
        inFlight = true;
        $("refresh").disabled = true;
        try {
          // Targets are fixed by the server at startup (the server does not
          // accept per-request targets), so no query parameters are sent.
          // Path-relative so the dashboard works both at the site root and
          // when mounted under a sub-path (e.g. behind Caddy at /status/).
          const res = await fetch("api/status");
          render(await res.json());
        } catch (e) {
          $("content").innerHTML =
            `<p class="error">Failed to load status: ${esc(e.message)}</p>`;
        } finally {
          inFlight = false;
          $("refresh").disabled = false;
        }
      }

      let timer = null;
      function syncTimer() {
        if (timer) clearInterval(timer);
        if ($("auto").checked) timer = setInterval(load, 30_000);
      }

      $("refresh").addEventListener("click", load);
      $("auto").addEventListener("change", syncTimer);
      syncTimer();
      load();
    </script>
  </body>
</html>
